<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandar's Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:          #0f1117;
            --surface:     #141921;
            --border:      #1c2840;
            --accent:      #4f8ef7;
            --accent-soft: rgba(79, 142, 247, 0.07);
            --accent-glow: rgba(79, 142, 247, 0.13);
            --text:        #dde4f0;
            --text-muted:  #5a6d8a;
            --text-dim:    #243148;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Sora', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Backgrounds ── */
        .dot-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 35%, rgba(8,10,18,0.8) 100%);
        }

        .blob-tl {
            position: fixed;
            top: -15%;
            left: -10%;
            width: 55%;
            height: 55%;
            background: radial-gradient(ellipse, rgba(79,142,247,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .blob-br {
            position: fixed;
            bottom: -15%;
            right: -10%;
            width: 45%;
            height: 45%;
            background: radial-gradient(ellipse, rgba(99,130,255,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        #cursor-glow {
            position: fixed;
            width: 650px;
            height: 650px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79,142,247,0.055) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
            transition: left 0.1s ease-out, top 0.1s ease-out;
        }

        /* ── Main layout ── */
        main {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem;
            width: 100%;
        }

        /* Name */
        h1 {
            font-size: clamp(3rem, 9vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.034em;
            line-height: 1;
            background: linear-gradient(155deg, #ffffff 0%, #cad8ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: default;
            opacity: 0;
            animation: slide-up 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
            transition: filter 0.35s ease;
        }

        h1:hover {
            filter: drop-shadow(0 0 28px rgba(79, 142, 247, 0.4));
        }

        /* Divider */
        .divider {
            width: 44px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 1.6rem 0;
            opacity: 0;
            animation: fade-in 0.5s ease 0.38s forwards;
        }

        /* Roles */
        .roles {
            font-family: 'Fira Code', monospace;
            font-size: 0.73rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            line-height: 1.9;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: slide-up 0.6s cubic-bezier(0.16,1,0.3,1) 0.44s forwards;
        }

        .roles .sep {
            margin: 0 0.5em;
            color: var(--text-dim);
        }

        .roles::after {
            content: '_';
            color: var(--accent);
            animation: blink 1.2s step-end 1.4s infinite;
            opacity: 0;
        }

        /* Icon-only link buttons */
        .links {
            display: flex;
            gap: 0.7rem;
            justify-content: center;
            opacity: 0;
            animation: slide-up 0.6s cubic-bezier(0.16,1,0.3,1) 0.58s forwards;
        }

        .link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            transition:
                color        0.22s ease,
                border-color 0.22s ease,
                background   0.22s ease,
                transform    0.22s ease,
                box-shadow   0.22s ease;
        }

        .link:hover {
            color: var(--accent);
            border-color: rgba(79, 142, 247, 0.35);
            background: var(--accent-soft);
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(79, 142, 247, 0.1);
        }

        .link svg {
            width: 17px;
            height: 17px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.75;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        /* Status */
        .status {
            position: fixed;
            bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.57rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
            opacity: 0;
            animation: fade-in 0.6s ease 1.1s forwards;
            user-select: none;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px rgba(79, 142, 247, 0.75);
            animation: pulse-dot 2.4s ease-in-out 1.6s infinite;
        }

        /* ── Keyframes ── */
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0);   }
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1;   transform: scale(1);   }
            50%       { opacity: 0.35; transform: scale(0.7); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Background layers -->
    <div class="dot-grid"></div>
    <div class="vignette"></div>
    <div class="blob-tl"></div>
    <div class="blob-br"></div>
    <div id="cursor-glow"></div>

    <!-- Main content -->
    <main>

        <h1>Mandar Patkar</h1>

        <div class="divider"></div>

        <p class="roles">
            Engineer<span class="sep">·</span>Developer<span class="sep">·</span>Pentester
        </p>

        <div class="links">

            <a href="https://github.com/patkarmandar" class="link" title="GitHub" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                </svg>
            </a>

            <a href="https://linkedin.com/in/mandarsh" class="link" title="LinkedIn" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                    <rect x="2" y="9" width="4" height="12"/>
                    <circle cx="4" cy="4" r="2"/>
                </svg>
            </a>

            <a href="mailto:reachmandar@protonmail.com" class="link" title="Email">
                <svg viewBox="0 0 24 24">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
            </a>

        </div>

    </main>

    <!-- Status -->
    <div class="status">
        <div class="status-dot"></div>
        open to connect
    </div>

    <script>
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', e => {
            glow.style.left = e.clientX + 'px';
            glow.style.top  = e.clientY + 'px';
        });
    </script>

</body>
</html>
