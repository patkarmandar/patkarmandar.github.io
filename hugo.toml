    [menu.main.params]
      icon = "fa-regular fa-user"

  # [[menu.main]]
  #   name = "About Alt"
  #   pageRef = "about-alternative"
  #   url = "/about-alternative/"
  #   weight = 2
  #   identifier = "about-alternative"
  #   [menu.main.params]
  #     icon = "fa-regular fa-user"

  [[menu.main]]
    name = "Projects"
    pageRef = "projects"
    url = "/projects/"
    weight = 3
    identifier = "projects"
    [menu.main.params]
      icon = "fa-regular fa-folder-open"

  [[menu.main]]
    name = "Blog"
    pageRef = "blog"
    url = "/blog/"
    weight = 4
    identifier = "blog"
    [menu.main.params]
      icon = "fa-regular fa-note-sticky"

# Markup Configuration
[markup]
  # Table of Contents
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

  # Goldmark Renderer (Markdown)
  [markup.goldmark.renderer]
    unsafe = true

  [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true

  [markup.goldmark.extensions]
    typographer = true
    linkify = true
    table = true
    strikethrough = true
    taskList = true
    definitionList = true
    footnote = true

    [markup.goldmark.extensions.extras.delete]
      enable = true
    [markup.goldmark.extensions.extras.insert]
      enable = true
    [markup.goldmark.extensions.extras.mark]
      enable = true

  # Syntax Highlighting
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    style = "monokai"
    tabWidth = 2

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"

# Privacy Configuration
[privacy]
  [privacy.youtube]
    privacyEnhanced = true
