baseURL = 'https://minimal-black-demo.netlify.app'
languageCode = 'en-us'
title = 'Everything Mandar'
theme = "minimal-black"

# Enable search index generation and web app manifest
[outputs]
  home = ["HTML", "RSS", "JSON", "WebAppManifest"]

[outputFormats.WebAppManifest]
  mediaType = "application/manifest+json"
  rel = "manifest"
  baseName = "manifest"
  isPlainText = true
  notAlternative = true

[params]
  brand = "PRIME"
  description = "Engineering security by breaking and building code."

  # Favicon - Place your favicon files in /static/ directory
  # Supported formats: .ico, .png, .svg
  favicon = "icons/favicon.svg"
  appleTouchIcon = "apple-touch-icon.png"

  # Logo (optional)
  logo = "images/logo.png"

  # Project and blog intro text
  projectsIntro = "A selection of things I’ve been building – tools, resources, and experiments." # Can be empty
  blogIntro = "" # Can be empty

  # Web App Manifest Configuration (PWA support)
  [params.manifest]
    themeColor = "#a855f7"
    backgroundColor = "#000000"
    categories = ["blog", "portfolio", "developer"]

    # Custom icon configuration (optional)
    # If not specified, defaults to /icons/android-chrome-*.png
    # [[params.manifest.icons]]
    #   src = "/icons/android-chrome-192x192.png"
    #   sizes = "192x192"
    #   type = "image/png"
    #   purpose = "any maskable"

  # Theme Configuration
  [params.theme]
    defaultTheme = "dark"  # Options: "light", "dark", "system"

  # Home Page Configuration
  [params.home]
    sections = ["hero", "now", "tech-marquee", "projects", "posts"]
    showNowSection = true
    showFeaturedProjects = true
    showLatestPosts = true
    featuredProjectsLimit = 3
    latestPostsLimit = 3
    projectsTitle = "Selected Projects"
    projectsSubtitle = ""
    blogTitle = "Latest Writing"
    blogSubtitle = ""
    techMarqueeLabel = "Experienced In"

    # Technology Stack Display
    [[params.home.tech]]
      label = "Cyber Security"
      icon = "fa-solid fa-shield-halved"

    [[params.home.tech]]
      label = "Application Security"
      icon = "fa-solid fa-bug"

    [[params.home.tech]]
      label = "API Security"
      icon = "devicon-postman-plain"

    [[params.home.tech]]
      label = "Network Security"
      icon = "fa-solid fa-network-wired"

    [[params.home.tech]]
      label = "Android Security"
      icon = "devicon-android-plain"

    [[params.home.tech]]
      label = "Reverse Engineering"
      icon = "fa-solid fa-screwdriver-wrench"

    [[params.home.tech]]
      label = "Cryptography"
      icon = "fa-solid fa-key"

    [[params.home.tech]]
      label = "OSINT"
      icon = "fa-solid fa-magnifying-glass"

    [[params.home.tech]]
      label = "Linux"
      icon = "devicon-linux-plain"

    [[params.home.techReverse]]
      label = "BASH"
      icon = "devicon-bash-plain"

    [[params.home.techReverse]]
      label = "Python"
      icon = "devicon-python-plain"

    [[params.home.techReverse]]
      label = "JavaScript"
      icon = "devicon-javascript-plain"

    [[params.home.techReverse]]
      label = "PHP"
      icon = "devicon-php-plain"

    [[params.home.techReverse]]
      label = "Laravel"
      icon = "devicon-laravel-plain"

    [[params.home.techReverse]]
      label = "C++"
      icon = "devicon-cplusplus-plain"

    [[params.home.techReverse]]
      label = "Java"
      icon = "devicon-java-plain"

    [[params.home.techReverse]]
      label = "SQL"
      icon = "devicon-mysql-plain"

    [[params.home.techReverse]]
      label = "Git"
      icon = "devicon-git-plain"

    [[params.home.techReverse]]
      label = "GitHub"
      icon = "devicon-github-plain"

    [[params.home.techReverse]]
      label = "Hugo"
      icon = "devicon-hugo-plain"

    [[params.home.techReverse]]
      label = "Markdown"
      icon = "devicon-markdown-original"

  # About Page Alternative Layout Configuration - Optional
  [params.about.alt]
    # Stats displayed in the profile card sidebar
    [[params.about.alt.stats]]
      value = "5+"
      label = "Years Coding"

    [[params.about.alt.stats]]
      value = "20+"
      label = "Projects"

    [[params.about.alt.stats]]
      value = "∞"
      label = "Hours Spent"

    # Skills/Tech Stack badges with icons
    [[params.about.alt.skills]]
      label = "JavaScript"
      icon = "devicon-javascript-plain"

    [[params.about.alt.skills]]
      label = "Python"
      icon = "devicon-python-plain"

    [[params.about.alt.skills]]
      label = "React"
      icon = "devicon-react-original"

    [[params.about.alt.skills]]
      label = "Docker"
      icon = "devicon-docker-plain"

    [[params.about.alt.skills]]
      label = "PostgreSQL"
      icon = "devicon-postgresql-plain"

    [[params.about.alt.skills]]
      label = "AWS"
      icon = "devicon-amazonwebservices-plain"

  # Hero Section Configuration
  [params.hero]
    badge = "Security Engineer"
    title = "Hi, I'm Mandar Patkar."
    role = "Engineering security by breaking and building code."
    summary = "Security starts where curiosity meets code. I dig into systems, map real attack paths, and transform vulnerabilities into clean, production-ready fixes. I don’t just test security — I engineer it."
    # avatar = "images/avatar.jpg"  # Optional: 400x400px recommended
    location = "Mumbai, IN"
    focus = "Currently focused on digging into systems."
    available = true
    availableLabel = "Available for work"

    nowLabel = "Quick Facts"
    nowIntro = "Right now I'm mainly:"
    now = [
      "Exploring application architecture",
      "Building security tools",
      "Writing secure code"
    ]

    [params.hero.primary]
      label = "View Projects"
      href = "/projects/"

    [params.hero.secondary]
      label = "Read the Blog"
      href = "/blog/"

  # Icon Libraries
  [params.icons]
    useFontAwesome = true
    useDevicon = true

  # Social Links
  [[params.social]]
    label = "GitHub"
    url = "https://github.com/patkarmandar"
    icon = "fa-brands fa-github"

  [[params.social]]
    label = "LinkedIn"
    url = "https://www.linkedin.com/in/mandarsh/"
    icon = "fa-brands fa-linkedin-in"

  [[params.social]]
    label = "Email"
    url = "mailto:reachmandar@protonmail.com"
    icon = "fa-regular fa-envelope"

  # Analytics Configuration
  [params.analytics]
    # Google Analytics (GA4)
    # googleAnalytics = "G-XXXXXXXXXX"

    # Plausible Analytics (privacy-friendly)
    # [params.analytics.plausible]
    #   enabled = true
    #   domain = "yourdomain.com"
    #   scriptUrl = "https://plausible.io/js/script.js"

    # Umami Analytics (self-hosted option)
    # [params.analytics.umami]
    #   enabled = true
    #   scriptUrl = "https://analytics.yourdomain.com/script.js"
    #   websiteId = "your-website-id"

    # Fathom Analytics
    # [params.analytics.fathom]
    #   enabled = true
    #   scriptUrl = "https://cdn.usefathom.com/script.js"
    #   siteId = "YOUR-SITE-ID"

